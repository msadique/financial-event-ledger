services:
  account-service:
    build: ./account-service
    environment:
      DATABASE_URL: sqlite:////data/account.db
      LOG_LEVEL: INFO
    volumes:
      - account-data:/data
      - ./reports:/reports
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [event-ledger]

  event-gateway:
    build: ./event-gateway
    environment:
      DATABASE_URL: sqlite:////data/gateway.db
      ACCOUNT_SERVICE_URL: http://account-service:8081
      ACCOUNT_SERVICE_TIMEOUT_SECONDS: "2"
      ACCOUNT_SERVICE_MAX_ATTEMPTS: "3"
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
      CIRCUIT_BREAKER_RECOVERY_SECONDS: "30"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      ASYNC_FALLBACK_ENABLED: "true"
      ASYNC_FALLBACK_POLL_SECONDS: "1"
      ASYNC_FALLBACK_BATCH_SIZE: "25"
      ASYNC_FALLBACK_BASE_BACKOFF_SECONDS: "1"
      ASYNC_FALLBACK_MAX_BACKOFF_SECONDS: "60"
      ASYNC_FALLBACK_JITTER_SECONDS: "0.25"
      LOG_LEVEL: INFO
    volumes:
      - gateway-data:/data
      - ./reports:/reports
    ports:
      - "8080:8080"
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [event-ledger]

  functional-tests:
    build: ./functional-tests
    environment:
      GATEWAY_URL: http://event-gateway:8080
      ACCOUNT_URL: http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
      event-gateway:
        condition: service_healthy
    profiles: [test]
    networks: [event-ledger]

  contract-consumer:
    build: ./event-gateway
    user: root
    environment:
      PACT_DIR: /contracts/pacts
      PACT_DO_NOT_TRACK: "1"
      ASYNC_FALLBACK_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
    volumes:
      - ./contract-tests:/contracts
    command: python -m pytest -q /contracts/consumer
    profiles: [test]
    networks: [event-ledger]

  contract-provider:
    build: ./account-service
    user: root
    environment:
      DATABASE_URL: sqlite:////tmp/contract-account.db
      PACT_DIR: /contracts/pacts
      PACT_DO_NOT_TRACK: "1"
    volumes:
      - ./contract-tests:/contracts
    command: python -m pytest -q /contracts/provider
    profiles: [test]
    networks: [event-ledger]

volumes:
  gateway-data:
  account-data:

networks:
  event-ledger:
